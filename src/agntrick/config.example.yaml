# Agntrick Configuration Example
# Generated by: agntrick init
# Docs: https://github.com/jeancsil/agntrick#configuration

llm:
  provider: openai          # openai, anthropic, google_genai, ollama
  model: glm-4.7            # model name (provider-specific)
  temperature: 0.1           # 0.0 = deterministic, 1.0 = creative
                            # For z.ai: set OPENAI_BASE_URL in .env
                            # For OpenRouter: set OPENAI_BASE_URL in .env

api:
  host: 127.0.0.1
  port: 8000

