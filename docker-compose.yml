services:
  agntrick:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agntrick

    # DNS configuration for reliable network resolution
    dns:
      - 8.8.8.8
      - 1.1.1.1

    # Mount volumes for live code updates and persistent logs
    volumes:
      # Mount source code for live updates (no rebuild needed)
      - ./agntrick/src:/app/agntrick/src
      - ./agntrick/tests:/app/agntrick/tests
      - ./agntrick/config:/app/agntrick/config
      - ./scripts:/app/scripts

      # Mount logs directory for easy access from host
      - ./agntrick/logs:/app/agntrick/logs

      # Mount storage directory for persistent WhatsApp session data
      - ./agntrick/storage:/app/agntrick/storage

      # Mount pyproject.toml in case you need to update dependencies
      - ./agntrick/pyproject.toml:/app/agntrick/pyproject.toml
      - ./agntrick/uv.lock:/app/agntrick/uv.lock

      # Persist the cache here. This creates a persistent folder at this path INSIDE the container
      - uv-cache:/root/.cache/uv
      - venv-data:/app/agntrick/.venv
    environment:
      - UV_LINK_MODE=copy

    # Pass environment variables from .env file
    env_file:
      - .env

    # Override default command - this will be overridden when running specific commands
    command: [ "uv", "--directory", "agntrick", "run", "agntrick", "--help" ]
    # Keep container running for interactive use (optional)
    stdin_open: true
    tty: true
volumes:
  uv-cache:
  venv-data:
    # Network mode (optional, use host network if needed)
    # network_mode: "host"
