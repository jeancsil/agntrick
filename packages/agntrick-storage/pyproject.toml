[project]
name = "agntrick-storage"
version = "0.1.0"
description = "Persistent storage for scheduled tasks and notes"
readme = "README.md"
requires-python = ">=3.12,<3.15"
authors = [
    {name = "Jean Carlos Silva", email = "jeancsil@gmail.com"}
]
license = {text = "MIT"}
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
keywords = ["ai", "agents", "storage", "scheduling", "cron"]

dependencies = [
    "pydantic>=2.12.5",
    "dateparser>=1.2.0",
    "croniter>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
]

[project.urls]
Homepage = "https://github.com/jeancsil/agntrick"
Documentation = "https://github.com/jeancsil/agntrick#readme"
Repository = "https://github.com/jeancsil/agntrick"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agntrick_storage"]

[tool.pytest.ini_options]
addopts = "-ra -q --import-mode=importlib"
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py312"
fix = true

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
